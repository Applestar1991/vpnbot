<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خرید آسان و سریع اشتراک</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #707579);
            --link-color: var(--tg-theme-link-color, #2481cc);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px 16px;
            direction: rtl;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }

        /* هدر لوکس با تم روشن تلگرام */
        .header { 
            text-align: center; 
            margin-bottom: 24px; 
        }
        .header .logo-wrapper {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--link-color), var(--button-color));
            border-radius: 18px; margin: 0 auto 12px auto;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 16px rgba(36, 129, 204, 0.3);
            animation: pulse 2.5s infinite ease-in-out;
        }
        .header h2 { margin: 0 0 6px 0; color: var(--button-color); font-size: 22px; font-weight: 800; }
        .header p { margin: 0; color: var(--hint-color); font-size: 13px; font-weight: 500; }

        .section-title {
            text-align: right; font-size: 13px; font-weight: 700;
            color: var(--hint-color); margin: 20px 4px 10px 0;
            letter-spacing: 0.3px;
        }

        /* گرید لوکیشن با استایل مدرن و سایه‌دار */
        .location-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 15px;
        }
        .location-card {
            background-color: var(--sec-bg); 
            border: 1.5px solid rgba(0, 0, 0, 0.03);
            border-radius: 16px; padding: 14px 6px; text-align: center; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        }
        .location-card.active {
            border-color: var(--button-color); 
            background-color: rgba(36, 129, 204, 0.06);
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(36, 129, 204, 0.15);
        }
        .flag { 
            font-size: 26px; display: block; margin-bottom: 5px; 
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.1));
        }
        .country-name { font-size: 12px; font-weight: 700; }

        /* منوی انتخاب پلان لوکس */
        .plan-select {
            width: 100%; padding: 15px; border-radius: 14px;
            border: 1px solid rgba(0,0,0,0.1); background-color: var(--sec-bg);
            color: var(--text-color); font-size: 15px; font-weight: 700; outline: none;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            appearance: none; -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%232481cc' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat; background-position: left 12px center; background-size: 16px;
        }

        /* باکس نمایش قیمت و فاکتور نهایی */
        .checkout-box {
            background-color: var(--sec-bg); 
            border-radius: 20px; padding: 20px;
            margin-top: 24px; border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }
        .price-row {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 15px; font-weight: 700; margin-bottom: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06); padding-bottom: 12px;
        }
        .price-value { color: #22c55e; font-size: 22px; font-weight: 800; }

        /* باکس اطلاعات کارت بانکی فوق‌العاده شیک */
        .card-info-box {
            background-color: rgba(36, 129, 204, 0.06); 
            border: 1px solid rgba(36, 129, 204, 0.12);
            border-radius: 14px; padding: 14px; margin-bottom: 16px; text-align: right;
            cursor: pointer; position: relative; overflow: hidden;
            transition: background 0.2s;
        }
        .card-info-box:active { background-color: rgba(36, 129, 204, 0.12); }
        .card-info-box span { font-size: 12px; color: var(--hint-color); font-weight: 500; }
        .card-info-box strong {
            font-size: 18px; letter-spacing: 1.5px; display: block; margin-top: 6px; 
            color: var(--text-color); font-family: monospace, sans-serif;
        }
        .copy-hint { 
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%); 
            font-size: 11px; color: var(--button-color); font-weight: bold; 
            background: rgba(36, 129, 204, 0.1); padding: 4px 10px; border-radius: 8px;
        }

        /* ورودی فیلد عددی کارت */
        .input-field {
            width: 100%; box-sizing: border-box; padding: 15px;
            border-radius: 14px; border: 1px solid rgba(0, 0, 0, 0.1);
            background-color: var(--bg-color); color: var(--text-color);
            text-align: center; font-size: 18px; font-weight: 700; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s; letter-spacing: 2px;
        }
        .input-field:focus { 
            border-color: var(--button-color); 
            box-shadow: 0 0 10px rgba(36, 129, 204, 0.1);
        }

        /* دکمه نهایی با تم لوکس و درخشان */
        .action-btn {
            background: linear-gradient(135deg, var(--link-color) 0%, var(--button-color) 100%);
            color: var(--button-text); border: none;
            padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 700;
            width: 100%; margin-top: 16px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(36, 129, 204, 0.25);
            transition: all 0.2s ease;
        }
        .action-btn:active {
            transform: scale(0.99);
            box-shadow: 0 2px 8px rgba(36, 129, 204, 0.15);
        }

        .footer-note {
            font-size: 11px; color: var(--hint-color); margin-top: 24px; text-align: center;
            opacity: 0.8; font-weight: 500;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-wrapper">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        </div>
        <h2>خرید آسان و سریع اشتراک</h2>
        <p>لوکیشن و حجم کانفیگ خود را انتخاب کنید</p>
    </div>

    <div class="section-title">📍 ۱. انتخاب لوکیشن سرور ابری:</div>
    <div class="location-grid">
        <div class="location-card active" onclick="selectLocation('Germany', '🇩🇪', this)">
            <span class="flag">🇩🇪</span>
            <span class="country-name">آلمان</span>
        </div>
    </div>

    <div class="section-title">📦 ۲. انتخاب حجم و پلان اختصاصی:</div>
    <select id="planSelector" class="plan-select" onchange="updatePrice()">
        <option value="plan_1" data-price="40000" data-name="۱۰ گیگابایت - ۱ ماهه">💎 پلان برنزی (۱۰ گیگابایت) — یک‌ماهه</option>
        <option value="plan_2" data-price="70000" data-name="۲۰ گیگابایت - ۱ ماهه">⚡ پلان نقره‌ای (۲۰ گیگابایت) — یک‌ماهه</option>
        <option value="plan_3" data-price="150000" data-name="👑 پلان طلایی (۵۰ گیگابایت) — دوماهه">👑 پلان طلایی (۵۰ گیگابایت) — دو‌ماهه</option>
    </select>

    <div class="checkout-box">
        <div class="price-row">
            <span>💰 مبلغ قابل پرداخت:</span>
            <span id="totalPrice" class="price-value">120 هزار تومان</span>
        </div>

        <div class="card-info-box" onclick="copyCardNumber('6037999999999999', this)">
            <span>💳 لمس کنید تا شماره کارت کپی شود:</span>
            <strong>۶۰۳۷ - ۹۹۹۹ - ۹۹۹۹ - ۹۹۹۹</strong>
            <span class="copy-hint">کپی</span>
        </div>

        <input type="text" id="card_last_four" class="input-field" placeholder="۴ رقم آخر کارت واریزی را وارد کنید" maxlength="4" pattern="\d*">
        <button class="action-btn" onclick="submitOrder()">ثبت نهایی و ارسال به مینی‌اپ</button>
    </div>

    <div class="footer-note">
        🔒 پلتفرم فروش بومی 
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // مقادیر پیش‌فرض لوکیشن
        let selectedLocationName = "Germany";
        let selectedLocationFlag = "🇩🇪";

        function selectLocation(country, flag, element) {
            selectedLocationName = country;
            selectedLocationFlag = flag;
            
            document.querySelectorAll('.location-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');

            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function updatePrice() {
            const selector = document.getElementById('planSelector');
            const price = parseInt(selector.options[selector.selectedIndex].getAttribute('data-price'));
            document.getElementById('totalPrice').innerText = price.toLocaleString('fa-IR') + " تومان";
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function copyCardNumber(cardNumber, element) {
            navigator.clipboard.writeText(cardNumber).then(() => {
                const hint = element.querySelector('.copy-hint');
                hint.innerText = "کپی شد!"; hint.style.color = "#22c55e";
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                setTimeout(() => { hint.innerText = "کپی"; hint.style.color = "var(--button-color)"; }, 2000);
            });
        }

        function submitOrder() {
            let cardInput = document.getElementById('card_last_four').value.trim();
            
            // تبدیل اتوماتیک اعداد فارسی به انگلیسی برای جلوگیری از بروز خطا در پردازش عددی
            const p2e = s => s.replace(/[۰-۹]/g, d => '۰۱۲۳۴۵۶۷۸۹'.indexOf(d));
            cardInput = p2e(cardInput);

            const selector = document.getElementById('planSelector');
            const planId = selector.value;
            const planName = selector.options[selector.selectedIndex].getAttribute('data-name');

            if (cardInput.length !== 4 || isNaN(cardInput)) {
                // اصلاح متد آلرت پیش فرض تلگرام از showAlert به ساختار استاندارد شو پاپ آپ
                tg.showPopup({
                    title: 'خطا',
                    message: '⚠️ لطفاً ۴ رقم آخر کارت خود را به صورت دقیق و عددی وارد کنید.',
                    buttons: [{type: 'ok'}]
                });
                return;
            }

            const confirmMessage = `👑 تایید و ارسال فاکتور خرید:\n\n📦 پلان: ${planName}\n📍 سرور: ${selectedLocationFlag} ${selectedLocationName}\n💳 کارت واریزی: ${cardInput}`;
            
            tg.showConfirm(confirmMessage, function(confirmed) {
                if (confirmed) {
                    const dataPayload = {
                        plan_id: planId,
                        plan_name: planName,
                        location: selectedLocationName,
                        card_last_four: cardInput
                    };

                    // ارسال پکیج کامل اطلاعات به هسته پایتون
                    tg.sendData(JSON.stringify(dataPayload));
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
